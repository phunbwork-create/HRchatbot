<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Assistant – Hỏi đáp Nghỉ phép</title>
  <meta name="description" content="Chatbot AI hỗ trợ hỏi đáp quy trình xin nghỉ phép tại doanh nghiệp. Tra cứu nhanh các loại nghỉ phép, quy trình phê duyệt, mẫu đơn." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background animated blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="header-left">
        <div class="avatar-bot">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a4 4 0 0 1 4 4v2H8V6a4 4 0 0 1 4-4z"/>
            <rect x="3" y="8" width="18" height="12" rx="3"/>
            <circle cx="9" cy="14" r="1.5"/>
            <circle cx="15" cy="14" r="1.5"/>
          </svg>
        </div>
        <div class="header-info">
          <h1>HR Assistant</h1>
          <span class="status-badge">
            <span class="status-dot"></span>
            Sẵn sàng hỗ trợ
          </span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="btn-clear" title="Xóa cuộc trò chuyện">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Chat area -->
    <main class="chat-area" id="chat-area">
      <!-- Welcome message will be injected by JS -->
    </main>

    <!-- Quick actions -->
    <div class="quick-actions" id="quick-actions">
      <button class="quick-btn" data-query="Có những loại nghỉ phép nào?">📋 Các loại nghỉ phép</button>
      <button class="quick-btn" data-query="Quy trình xin nghỉ phép gồm mấy bước?">📝 Quy trình nghỉ phép</button>
      <button class="quick-btn" data-query="Ai phê duyệt đơn xin nghỉ?">✅ Ai phê duyệt?</button>
      <button class="quick-btn" data-query="Cho tôi xem mẫu đơn xin nghỉ phép">📄 Mẫu đơn nghỉ phép</button>
      <button class="quick-btn" data-query="Cần lưu ý gì khi viết đơn xin nghỉ phép?">⚠️ Lưu ý quan trọng</button>
      <button class="quick-btn" data-query="Xin nghỉ trước bao lâu?">⏰ Thời gian xin phép</button>
    </div>

    <!-- Input area -->
    <footer class="input-area" id="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          placeholder="Hỏi về quy trình nghỉ phép..."
          rows="1"
          maxlength="500"
        ></textarea>
        <button class="btn-send" id="btn-send" title="Gửi">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Dữ liệu truy xuất từ quy trình nghỉ phép nội bộ · Nguồn: Tanca.io</p>
    </footer>
  </div>

  <script src="knowledge.js"></script>
  <script src="app.js"></script>
</body>
</html>
